name: CI

on:
  push:
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build

      - name: Lint
        run: |
          python -m ruff check ego_metrology tests server.py

      - name: Test
        run: |
          python -m pytest -q -W error::DeprecationWarning

      - name: Build
        run: |
          python -m build

      - name: Smoke test package import
        run: |
          python - <<'PY'
          from ego_metrology import __version__, EgoProfiler
          print("__version__ =", __version__)
          p = EgoProfiler("mistral-7b")
          r = p.profile(prompt_tokens=1200)
          print(r)
          PY

      - name: Smoke test CLI
        run: |
          python -m ego_metrology --list

      - name: Smoke test server import
        run: |
          python - <<'PY'
          import asyncio
          import server
          print(server.app.version)
          print(asyncio.run(server.health()))
          PY
