name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest build

      - name: Run tests
        run: pytest tests/ -v

      - name: Build package
        run: python -m build

      - name: Install built wheel
        run: pip install dist/*.whl

      - name: Smoke test CLI
        run: ego-profile deepseek-14b 12000

      - name: Smoke test import
        run: python -c "from ego_metrology import EgoProfiler; print(EgoProfiler('mistral-7b').profile(4000).summary())"
